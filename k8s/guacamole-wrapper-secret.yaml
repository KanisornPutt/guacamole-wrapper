apiVersion: v1
kind: Secret
metadata:
  name: guacamole-wrapper-secret
  labels:
    app: guacamole-wrapper

type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://guacadmin:password@postgres:5432/wrapper_db"
  GUACAMOLE_USERNAME: "guacadmin"
  GUACAMOLE_PASSWORD: "changeme"
  GUACAMOLE_NEW_USER_PASSWORD: "changeme"
  GUACAMOLE_SSH_PASSWORD: "changeme"
