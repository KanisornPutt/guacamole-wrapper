services:
  db:
    image: postgres:16-alpine
    container_name: guacamole-wrapper-db
    environment:
      POSTGRES_DB: wrapper_db
      POSTGRES_USER: guacadmin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacadmin -d wrapper_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: kanisornp/guacamole-wrapper:v.1
    build:
      context: .
    container_name: guacamole-wrapper-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://guacadmin:password@db:5432/wrapper_db
      SQLALCHEMY_ECHO: "false"
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
